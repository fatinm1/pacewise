# PaceWise dbt project: transform Strava activity data in BigQuery
name: 'pacewise'
version: '1.0.0'
config-version: 2
profile: 'pacewise'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  pacewise:
    staging:
      +materialized: view
    marts:
      +materialized: table
